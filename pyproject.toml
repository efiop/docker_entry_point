[tool.fal.apps.simple_app]
auth = "public"
machine_type = "S"
exposed_port = 8000

[tool.fal.apps.simple_app.image]
dockerfile = "Dockerfile"
entrypoint = ["python", "/app/simple_app.py"]
cmd = ["--host", "0.0.0.0", "--port", "8000"]

[tool.fal.apps.simple_func]
auth = "public"
machine_type = "S"

[tool.fal.apps.simple_func.image]
dockerfile = "Dockerfile"
entrypoint = ["python", "/app/simple_func.py"]
cmd = ["--name", "Docker"]
